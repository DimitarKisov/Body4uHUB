trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Body4uHUB.Identity.Api/**
      - Body4uHUB.Identity.Application/**
      - Body4uHUB.Identity.Domain/**
      - Body4uHUB.Identity.Infrastructure/**
      - Body4uHUB.Identity.Application.Tests/**
      - Body4uHUB.Identity.Domain.UnitTests/**

pool:
  name: Default

variables:
  - name: buildConfiguration
    value: 'Release'
  - name: dotnetVersion
    value: '8.x'
  - name: serviceName
    value: 'Identity'

stages:
# ==================== STAGE 1: BUILD IDENTITY SERVICE ====================
  - stage: Build
    displayName: 'Build Identity Service'
    jobs:
      - job: BuildIdentity
        displayName: 'Build and Test Identity Service'
        steps:

          # 1. Install .NET SDK
          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          # 2. Restore NuGet packages
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: restore
              projects: 'Body4uHUB.Identity.Api/Body4uHUB.Identity.Api.csproj'

          # 3. Build Identity Service
          - task: DotNetCoreCLI@2
            displayName: 'Build Identity Service'
            inputs:
              command: 'build'
              projects: 'Body4uHUB.Identity.Api/Body4uHUB.Identity.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          # 4. Run Unit Tests
          - task: DotNetCoreCLI@2
            displayName: 'Run Unit Tests'
            inputs:
              command: 'test'
              projects: |
                Body4uHUB.Identity.Application.Tests/*.csproj
                Body4uHUB.Identity.Domain.UnitTests/*.csproj
              arguments: '--configuration $(buildConfiguration) --no-build'

          # 5. Publish Identity Service
          - task: DotNetCoreCLI@2
            displayName: 'Publish Identity Service'
            inputs:
              command: 'publish'
              projects: 'Body4uHUB.Identity.Api/Body4uHUB.Identity.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/Identity'
              publishWebProjects: false
              zipAfterPublish: false

          # 6. Publish Build Artifacts
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/Identity'
              ArtifactName: 'identity-drop'
              publishLocation: 'Container'

# ==================== STAGE 2: DEPLOY TO DEVELOPMENT ====================
  - stage: Deploy_Development
    displayName: 'Deploy Identity to Development'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - template: templates/deploy-single-service-to-iis.yml
        parameters:
          serviceName: 'Identity'
          artifactName: 'identity-drop'
          environmentName: 'Development'
          variableGroup: 'Body4uHUB-Development-Secrets'
          iisPath: 'C:\inetpub\Body4uHUB-Dev\Identity'
          iisAppPoolName: 'Body4uHUB-Identity-Dev'
          iisSiteName: 'Body4uHUB-Identity-Dev'

# ==================== STAGE 3: DEPLOY TO TEST ====================
  - stage: Deploy_Test
    displayName: 'Deploy Identity to Test'
    dependsOn: Deploy_Development
    condition: succeeded()
    jobs:
      - template: templates/deploy-single-service-to-iis.yml
        parameters:
          serviceName: 'Identity'
          artifactName: 'identity-drop'
          environmentName: 'Test'
          variableGroup: 'Body4uHUB-Test-Secrets'
          iisPath: 'C:\inetpub\Body4uHUB-Test\Identity'
          iisAppPoolName: 'Body4uHUB-Identity-Test'
          iisSiteName: 'Body4uHUB-Identity-Test'

# ==================== STAGE 4: DEPLOY TO PRODUCTION ====================
  - stage: Deploy_Production
    displayName: 'Deploy Identity to Production'
    dependsOn: Deploy_Test
    condition: false # Manual trigger only
    jobs:
      - template: templates/deploy-single-service-to-iis.yml
        parameters:
          serviceName: 'Identity'
          artifactName: 'identity-drop'
          environmentName: 'Production'
          variableGroup: 'Body4uHUB-Production-Secrets'
          iisPath: 'C:\inetpub\Body4uHUB\Identity'
          iisAppPoolName: 'Body4uHUB-Identity'
          iisSiteName: 'Body4uHUB-Identity'
          requiresApproval: true