trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Body4uHUB.Services.Api/**
      - Body4uHUB.Services.Application/**
      - Body4uHUB.Services.Domain/**
      - Body4uHUB.Services.Infrastructure/**

variables:
  acrName: 'body4uhubacr'
  acrLoginServer: 'body4uhubacr.azurecr.io'
  azureConnection: 'body4uhub-azure-connection'
  resourceGroup: 'rg-body4uhub'
  containerAppsEnvironment: 'body4uhub-env'
  imageTag: '$(Build.BuildId)'
  buildConfiguration: 'Release'
  dotnetVersion: '8.x'

stages:

# ─────────────────────────────────────────
# STAGE 1: Build & Push Marketplace Image
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build and Push Marketplace Image'
  jobs:
  - job: BuildAndPush
    displayName: 'ACR Build & Push'
    pool:
      name: Default
    steps:
    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        packageType: sdk
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Build Services Marketplace'
      inputs:
        command: 'build'
        projects: 'Body4uHUB.Services.Api/Body4uHUB.Services.Api.csproj'
        arguments: '--configuration $(buildConfiguration)'
        
    - task: AzureCLI@2
      displayName: 'Build & Push Marketplace API'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr build `
            --registry $(acrName) `
            --image marketplace-api:$(imageTag) `
            --image marketplace-api:latest `
            --file Body4uHUB.Services.Api/Dockerfile `
            .

# ─────────────────────────────────────────
# STAGE 2: Deploy Marketplace Container App
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy Marketplace Container App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Deploy Marketplace API'
    pool:
      name: Default
    steps:
    - task: AzureCLI@2
      displayName: 'Install Container Apps Extension'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade -y

    - task: AzureCLI@2
      displayName: 'Deploy Marketplace API'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Continue'
          az containerapp show `
            --name body4uhub-marketplace-api `
            --resource-group $(resourceGroup) 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating Marketplace API..."
            az containerapp create `
              --name body4uhub-marketplace-api `
              --resource-group $(resourceGroup) `
              --environment $(containerAppsEnvironment) `
              --image $(acrLoginServer)/marketplace-api:$(imageTag) `
              --registry-server $(acrLoginServer) `
              --registry-identity /subscriptions/c6045f36-0e25-48e4-8109-3570d2b79748/resourceGroups/rg-body4uhub/providers/Microsoft.ManagedIdentity/userAssignedIdentities/body4uhub-managed-identity `
              --user-assigned /subscriptions/c6045f36-0e25-48e4-8109-3570d2b79748/resourceGroups/rg-body4uhub/providers/Microsoft.ManagedIdentity/userAssignedIdentities/body4uhub-managed-identity `
              --target-port 8080 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --env-vars ASPNETCORE_ENVIRONMENT=Production MassTransit__Host=body4uhub-rabbitmq
          } else {
            Write-Host "Updating Marketplace API..."
            az containerapp update `
              --name body4uhub-marketplace-api `
              --resource-group $(resourceGroup) `
              --image $(acrLoginServer)/marketplace-api:$(imageTag)
          }
