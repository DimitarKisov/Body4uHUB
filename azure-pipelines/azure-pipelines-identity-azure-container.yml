trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Body4uHUB.Identity.Api/**
      - Body4uHUB.Identity.Application/**
      - Body4uHUB.Identity.Domain/**
      - Body4uHUB.Identity.Infrastructure/**
      - Body4uHUB.Identity.Application.Tests/**
      - Body4uHUB.Identity.Domain.UnitTests/**

variables:
  acrName: 'body4uhubacr'
  acrLoginServer: 'body4uhubacr.azurecr.io'
  azureConnection: 'body4uhub-azure-connection'
  resourceGroup: 'rg-body4uhub'
  containerAppsEnvironment: 'body4uhub-env'
  imageTag: '$(Build.BuildId)'
  buildConfiguration: 'Release'
  dotnetVersion: '8.x'
  storageMount: 'dataprotection-keys-mount'

stages:

# ─────────────────────────────────────────
# STAGE 1: Build & Push Identity Image
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build and Push Identity Image'
  jobs:
  - job: BuildAndPush
    displayName: 'ACR Build & Push'
    pool:
      name: Default

    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        packageType: sdk
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Build Identity Service and Tests'
      inputs:
        command: 'build'
        projects: |
          Body4uHUB.Identity.Api/Body4uHUB.Identity.Api.csproj
          Body4uHUB.Identity.Application.Tests/Body4uHUB.Identity.Application.Tests.csproj
          Body4uHUB.Identity.Domain.UnitTests/Body4uHUB.Identity.Domain.UnitTests.csproj
        arguments: '--configuration $(buildConfiguration)'

    - task: DotNetCoreCLI@2
      displayName: 'Run Unit Tests'
      inputs:
        command: 'test'
        projects: |
          Body4uHUB.Identity.Application.Tests/Body4uHUB.Identity.Application.Tests.csproj
          Body4uHUB.Identity.Domain.UnitTests/Body4uHUB.Identity.Domain.UnitTests.csproj
        arguments: '--configuration $(buildConfiguration) --no-build'
        publishTestResults: true

    - task: AzureCLI@2
      displayName: 'Build & Push Identity API'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr build `
            --registry $(acrName) `
            --image identity-api:$(imageTag) `
            --image identity-api:latest `
            --file Body4uHUB.Identity.Api/Dockerfile `
            .

# ─────────────────────────────────────────
# STAGE 2: Deploy Identity Container App
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy Identity Container App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Deploy Identity API'
    pool:
      name: Default

    steps:

    - task: AzureCLI@2
      displayName: 'Install Container Apps Extension'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade -y

    - task: AzureCLI@2
      displayName: 'Deploy Identity API'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Continue'
          az containerapp show `
            --name body4uhub-identity-api `
            --resource-group $(resourceGroup) 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating Identity API..."
            az containerapp create `
              --name body4uhub-identity-api `
              --resource-group $(resourceGroup) `
              --environment $(containerAppsEnvironment) `
              --image $(acrLoginServer)/identity-api:$(imageTag) `
              --registry-server $(acrLoginServer) `
              --registry-identity /subscriptions/c6045f36-0e25-48e4-8109-3570d2b79748/resourceGroups/rg-body4uhub/providers/Microsoft.ManagedIdentity/userAssignedIdentities/body4uhub-managed-identity `
              --user-assigned /subscriptions/c6045f36-0e25-48e4-8109-3570d2b79748/resourceGroups/rg-body4uhub/providers/Microsoft.ManagedIdentity/userAssignedIdentities/body4uhub-managed-identity `
              --target-port 8080 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --env-vars ASPNETCORE_ENVIRONMENT=Production MassTransit__Host=body4uhub-rabbitmq `
              --volume name=dataprotection,storage-name=$(storageMount),storage-type=AzureFile `
              --mount-path /home/app/.aspnet/DataProtection-Keys `
              --volume-mount-name dataprotection
          } else {
            Write-Host "Updating Identity API..."
            az containerapp update `
              --name body4uhub-identity-api `
              --resource-group $(resourceGroup) `
              --image $(acrLoginServer)/identity-api:$(imageTag)
          }
