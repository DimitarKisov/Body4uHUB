trigger: none # Пуска се ръчно - инфраструктурата не се deploy-ва при всеки commit

variables:
  azureConnection: 'body4uhub-azure-connection'
  resourceGroup: 'rg-body4uhub'
  containerAppsEnvironment: 'body4uhub-env'
  keyVaultName: 'body4uhubkvault'
  location: 'westeurope'

stages:

# ─────────────────────────────────────────
# STAGE 1: Deploy Infrastructure
# ─────────────────────────────────────────
- stage: Deploy_Infrastructure
  displayName: 'Deploy Infrastructure'
  jobs:
  - job: DeployInfrastructure
    displayName: 'Deploy SQL Server & RabbitMQ'
    pool:
      name: Default

    steps:

    - task: AzureCLI@2
      displayName: 'Install Container Apps Extension'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade -y

    # Вземи secrets от Key Vault
    - task: AzureCLI@2
      displayName: 'Get Secrets from Key Vault'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $SA_PASSWORD = az keyvault secret show --vault-name $(keyVaultName) --name "SA--Password" --query value -o tsv
          $RABBITMQ_USER = az keyvault secret show --vault-name $(keyVaultName) --name "RabbitMQ--Default--Username" --query value -o tsv
          $RABBITMQ_PASS = az keyvault secret show --vault-name $(keyVaultName) --name "RabbitMQ--Default--Password" --query value -o tsv
          Write-Host "##vso[task.setvariable variable=SA_PASSWORD;issecret=true]$SA_PASSWORD"
          Write-Host "##vso[task.setvariable variable=RABBITMQ_USER;issecret=true]$RABBITMQ_USER"
          Write-Host "##vso[task.setvariable variable=RABBITMQ_PASS;issecret=true]$RABBITMQ_PASS"

    # Създай Environment ако не съществува
    - task: AzureCLI@2
      displayName: 'Create Container Apps Environment'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Continue'
          az containerapp env show `
            --name $(containerAppsEnvironment) `
            --resource-group $(resourceGroup) 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating Container Apps Environment..."
            az containerapp env create `
              --name $(containerAppsEnvironment) `
              --resource-group $(resourceGroup) `
              --location $(location)
          } else {
            Write-Host "Environment already exists, skipping..."
          }

    # Deploy SQL Server
    - task: AzureCLI@2
      displayName: 'Deploy SQL Server'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Continue'
          az containerapp show `
            --name body4uhub-sqlserver `
            --resource-group $(resourceGroup) 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating SQL Server..."
            az containerapp create `
              --name body4uhub-sqlserver `
              --resource-group $(resourceGroup) `
              --environment $(containerAppsEnvironment) `
              --image mcr.microsoft.com/mssql/server:2019-latest `
              --target-port 1433 `
              --ingress internal `
              --min-replicas 1 `
              --max-replicas 1 `
              --env-vars ACCEPT_EULA=Y "SA_PASSWORD=$(SA_PASSWORD)"
          } else {
            Write-Host "SQL Server already exists, skipping..."
          }

    # Deploy RabbitMQ
    - task: AzureCLI@2
      displayName: 'Deploy RabbitMQ'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Continue'
          az containerapp show `
            --name body4uhub-rabbitmq `
            --resource-group $(resourceGroup) 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating RabbitMQ..."
            az containerapp create `
              --name body4uhub-rabbitmq `
              --resource-group $(resourceGroup) `
              --environment $(containerAppsEnvironment) `
              --image rabbitmq:management-alpine `
              --target-port 5672 `
              --ingress internal `
              --min-replicas 1 `
              --max-replicas 1 `
              --env-vars "RABBITMQ_DEFAULT_USER=$(RABBITMQ_USER)" "RABBITMQ_DEFAULT_PASS=$(RABBITMQ_PASS)"
          } else {
            Write-Host "RabbitMQ already exists, skipping..."
          }
