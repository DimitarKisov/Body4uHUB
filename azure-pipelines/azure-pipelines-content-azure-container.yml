trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Body4uHUB.Content.Api/**
      - Body4uHUB.Content.Application/**
      - Body4uHUB.Content.Domain/**
      - Body4uHUB.Content.Infrastructure/**

variables:
  acrName: 'body4uhubacr'
  acrLoginServer: 'body4uhubacr.azurecr.io'
  azureConnection: 'body4uhub-azure-connection'
  resourceGroup: 'rg-body4uhub'
  containerAppsEnvironment: 'body4uhub-env'
  imageTag: '$(Build.BuildId)'

stages:

# ─────────────────────────────────────────
# STAGE 1: Build & Push Content Image
# ─────────────────────────────────────────
- stage: Build
  displayName: 'Build and Push Content Image'
  jobs:
  - job: BuildAndPush
    displayName: 'ACR Build & Push'
    pool:
      name: Default

    steps:

    - task: AzureCLI@2
      displayName: 'Build & Push Content API'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr build `
            --registry $(acrName) `
            --image content-api:$(imageTag) `
            --image content-api:latest `
            --file Body4uHUB.Content.Api/Dockerfile `
            .

# ─────────────────────────────────────────
# STAGE 2: Deploy Content Container App
# ─────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy Content Container App'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: Deploy
    displayName: 'Deploy Content API'
    pool:
      name: Default

    steps:

    - task: AzureCLI@2
      displayName: 'Install Container Apps Extension'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az extension add --name containerapp --upgrade -y

    - task: AzureCLI@2
      displayName: 'Deploy Content API'
      inputs:
        azureSubscription: '$(azureConnection)'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          $ErrorActionPreference = 'Continue'
          az containerapp show `
            --name body4uhub-content-api `
            --resource-group $(resourceGroup) 2>$null | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Creating Content API..."
            az containerapp create `
              --name body4uhub-content-api `
              --resource-group $(resourceGroup) `
              --environment $(containerAppsEnvironment) `
              --image $(acrLoginServer)/content-api:$(imageTag) `
              --registry-server $(acrLoginServer) `
              --registry-identity /subscriptions/c6045f36-0e25-48e4-8109-3570d2b79748/resourceGroups/rg-body4uhub/providers/Microsoft.ManagedIdentity/userAssignedIdentities/body4uhub-managed-identity `
              --user-assigned /subscriptions/c6045f36-0e25-48e4-8109-3570d2b79748/resourceGroups/rg-body4uhub/providers/Microsoft.ManagedIdentity/userAssignedIdentities/body4uhub-managed-identity `
              --target-port 8080 `
              --ingress external `
              --min-replicas 1 `
              --max-replicas 1 `
              --env-vars ASPNETCORE_ENVIRONMENT=Production
          } else {
            Write-Host "Updating Content API..."
            az containerapp update `
              --name body4uhub-content-api `
              --resource-group $(resourceGroup) `
              --image $(acrLoginServer)/content-api:$(imageTag)
          }
