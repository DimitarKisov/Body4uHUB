trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Body4uHUB.Content.Api/**
      - Body4uHUB.Content.Application/**
      - Body4uHUB.Content.Domain/**
      - Body4uHUB.Content.Infrastructure/**

pool:
  name: Default

variables:
  - name: buildConfiguration
    value: 'Release'
  - name: dotnetVersion
    value: '8.x'
  - name: serviceName
    value: 'Content'

stages:
# ==================== STAGE 1: BUILD CONTENT SERVICE ====================
  - stage: Build
    displayName: 'Build Content Service'
    jobs:
      - job: BuildContent
        displayName: 'Build and Test Content Service'
        steps:

          # 1. Install .NET SDK
          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          # 2. Restore NuGet packages
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: restore
              projects: 'Body4uHUB.Content.Api/Body4uHUB.Content.Api.csproj'

          # 3. Build Content Service
          - task: DotNetCoreCLI@2
            displayName: 'Build Content Service'
            inputs:
              command: 'build'
              projects: 'Body4uHUB.Content.Api/Body4uHUB.Content.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          # 5. Publish Content Service
          - task: DotNetCoreCLI@2
            displayName: 'Publish Content Service'
            inputs:
              command: 'publish'
              projects: 'Body4uHUB.Content.Api/Body4uHUB.Content.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/Content'
              publishWebProjects: false
              zipAfterPublish: false

          # 6. Publish Build Artifacts
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/Content'
              ArtifactName: 'content-drop'
              publishLocation: 'Container'

# ==================== STAGE 2: DEPLOY TO DEVELOPMENT ====================
  - stage: Deploy_Development
    displayName: 'Deploy Content to Development'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - template: templates/deploy-single-service-to-iis.yml
        parameters:
          serviceName: 'Content'
          artifactName: 'content-drop'
          environmentName: 'Development'
          variableGroup: 'Body4uHUB-Development-Secrets'
          iisPath: 'C:\inetpub\Body4uHUB-Dev\Content'
          iisAppPoolName: 'Body4uHUB-Content-Dev'
          iisSiteName: 'Body4uHUB-Content-Dev'
          servicePort: 5002

# ==================== STAGE 3: DEPLOY TO TEST ====================
  - stage: Deploy_Test
    displayName: 'Deploy Content to Test'
    dependsOn: Deploy_Development
    condition: succeeded()
    jobs:
      - template: templates/deploy-single-service-to-iis.yml
        parameters:
          serviceName: 'Content'
          artifactName: 'content-drop'
          environmentName: 'Test'
          variableGroup: 'Body4uHUB-Test-Secrets'
          iisPath: 'C:\inetpub\Body4uHUB-Test\Content'
          iisAppPoolName: 'Body4uHUB-Content-Test'
          iisSiteName: 'Body4uHUB-Content-Test'
          servicePort: 6002

# ==================== STAGE 4: DEPLOY TO PRODUCTION ====================
  - stage: Deploy_Production
    displayName: 'Deploy Content to Production'
    dependsOn: Deploy_Test
    condition: false # Manual trigger only
    jobs:
      - template: templates/deploy-single-service-to-iis.yml
        parameters:
          serviceName: 'Content'
          artifactName: 'content-drop'
          environmentName: 'Production'
          variableGroup: 'Body4uHUB-Production-Secrets'
          iisPath: 'C:\inetpub\Body4uHUB\Content'
          iisAppPoolName: 'Body4uHUB-Content'
          iisSiteName: 'Body4uHUB-Content'
          servicePort: 7002
          requiresApproval: true
